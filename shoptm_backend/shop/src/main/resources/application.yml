server:
  port: 8302

spring:
  application:
    name: shoptm

  datasource:
    url: jdbc:postgresql://localhost:5433/shoptm
    username: postgres
    password: 1004
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  security:
    user:
      name: none
      password: none

file:
  upload-dir: /root/uploads

jwt:
  secret: shoptmSecretKey256bitLongEnoughForHS256Algorithm!!
  expiration: 86400000